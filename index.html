<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln's Egg-celent Adventure</title>
    <link rel="icon" type="image/jpeg" href="IMG_0724.jpeg">
    <style>
        :root { 
            --lavender: #e0b0ff; 
            --deep-purple: #7d5fff; 
            --white: #ffffff; 
            --bubblegum: #ffafcc; 
            --sunshine: #fff3b0; 
            --grass: #7bf1a8;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: var(--lavender);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--deep-purple); margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        /* Backgrounds */
        .bg-kitchen { background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1522336572468-97b06e8ef143?auto=format&fit=crop&w=1200'); }
        .bg-buffet { background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1200'); }
        .bg-factory { background-image: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1558961312-30ca048846c8?auto=format&fit=crop&w=1200'); }
        .bg-space { background-image: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?auto=format&fit=crop&w=1200'); }

        #game-wrapper { max-width: 1200px; width: 100%; display: flex; gap: 20px; padding: 20px; box-sizing: border-box; z-index: 1; }
        .left-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .clicker-section { text-align: center; display: flex; flex-direction: column; align-items: center; }

        #score-panel {
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 30px;
            border: 4px solid var(--bubblegum); width: 100%; backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(255, 175, 204, 0.3);
        }

        #score-text { font-size: 3.5rem; color: var(--deep-purple); margin: 0; line-height: 1.2; text-shadow: 2px 2px var(--sunshine); }

        #lincoln-main {
            width: 280px; height: 280px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.05s, filter 0.3s; user-select: none; margin-top: 10px;
        }
        #lincoln-main:active { transform: scale(0.96); }

        .shop-container {
            flex: 1.2; background: rgba(255, 255, 255, 0.4); padding: 15px;
            border-radius: 30px; height: 90vh; overflow-y: auto; border: 2px solid var(--white);
            backdrop-filter: blur(15px);
        }

        .upgrade {
            width: 100%; background: var(--white); border: 3px solid var(--lavender);
            border-radius: 20px; padding: 12px 18px; color: var(--deep-purple); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            transition: 0.2s ease;
        }
        .can-afford { border-color: var(--grass) !important; background: var(--sunshine); transform: translateY(-2px); }
        .u-info { text-align: left; }
        .u-name { font-weight: bold; color: var(--deep-purple); display: block; font-size: 1.1rem; }
        .u-desc { font-size: 0.75rem; color: #777; display: block; }
        .u-cost { color: #444; font-size: 0.9rem; font-weight: bold; margin-top: 4px; display: block; }
        .u-count { font-size: 1.8rem; font-weight: bold; color: var(--bubblegum); opacity: 0.9; }

        .prestige-btn { background: var(--grass); color: #2d3436; font-weight: bold; width: 100%; padding: 15px; border-radius: 20px; border: none; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(123, 241, 168, 0.4); }
        
        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--bubblegum); z-index: 999; font-size: 1.5rem; -webkit-text-stroke: 1px white; }
        @keyframes flyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="bg-kitchen">

<div id="game-wrapper">
    <div class="left-column">
        <div class="clicker-section">
            <div id="score-panel">
                <h1 id="score-text">0</h1>
                <p id="env-label" style="margin: 5px 0 2px 0; letter-spacing: 2px; font-size: 0.7rem; font-weight: bold; color: var(--bubblegum);">LOCATION: THE GARDEN GATE</p>
                <p id="save-status" style="margin: 0; font-size: 0.6rem; color: #aaa; font-style: italic;">Ready to hunt!</p>
                
                <div style="font-size: 0.8rem; background: var(--white); padding: 10px; border-radius: 20px; margin-top: 10px; border: 1px solid var(--lavender);">
                    Click Power: <span id="stat-click">1</span> | Eggs/sec: <span id="stat-cps">0</span><br>
                    <span style="color:var(--gold); font-weight: bold;">Golden Carrots: <span id="stat-prestige">0</span></span>
                </div>
            </div>
            <img src="IMG_0724.jpeg" id="lincoln-main" alt="Lincoln">
            <button class="prestige-btn" id="prestige-btn" style="display:none;" onclick="prestige()">BIG REVEAL (WEIGH IN)</button>
            <div style="margin-top:20px;">
                <button onclick="resetGame()" style="background:none; border:none; color:var(--deep-purple); cursor:pointer; font-size: 0.7rem; text-decoration: underline; opacity: 0.5;">Reset Adventure</button>
            </div>
        </div>
    </div>
    <div class="shop-container" id="shop"></div>
</div>

<script>
// --- CORE GAME DATA ---
const SAVE_KEY = "lincoln_ultimate_save"; // Keep this the same across all future updates!
let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0;

const initialUpgrades = [
    { id: 0, name: "Marshmallow Chick", cost: 15, power: 0.1, type: "click", desc: "Sweet and squishy. +0.1 Click" },
    { id: 1, name: "Plastic Egg", cost: 100, power: 0.3, type: "cps", desc: "What's inside? +0.3/sec" },
    { id: 2, name: "Wicker Basket", cost: 500, power: 0.8, type: "cps", desc: "Room for more candy. +0.8/sec" },
    { id: 3, name: "Jelly Bean Trail", cost: 1200, power: 0.6, type: "click", desc: "Follow the sugar. +0.6 Click" },
    { id: 4, name: "Floppy Ears", cost: 3000, power: 2.5, type: "cps", desc: "Hear the candy coming. +2.5/sec" },
    { id: 5, name: "Polka Dot Ribbon", cost: 10000, power: 7.0, type: "cps", desc: "Dressed for the hunt. +7.0/sec" },
    { id: 6, name: "Chocolate Bunny", cost: 25000, power: 15.0, type: "cps", desc: "Solid or hollow? +15/sec" },
    { id: 7, name: "Magic Carrot", cost: 85000, power: 50.0, type: "cps", desc: "Grown in sunlight. +50/sec" },
    { id: 8, name: "Egg Decorating Kit", cost: 200000, power: 12, type: "click", desc: "Master of the dye. +12 Click" },
    { id: 9, name: "Garden Parade", cost: 500000, power: 150, type: "cps", desc: "Marching for sweets. +150/sec" },
    { id: 10, name: "Chocolate Fountain", cost: 2000000, power: 500, type: "cps", desc: "Infinite dipping. +500/sec" },
    { id: 11, name: "The Big Bunny Hut", cost: 8000000, power: 1500, type: "cps", desc: "Bunny HQ. +1500/sec" },
    { id: 12, name: "Diamond Egg", cost: 40000000, power: 1200, type: "click", desc: "The ultimate prize. +1200 Click" },
    { id: 13, name: "Candy Kingdom", cost: 150000000, power: 18000, type: "cps", desc: "Sugar overload! +18k/sec" },
    { id: 14, name: "Easter Morning Sun", cost: 2500000000, power: 120000, type: "cps", desc: "The perfect hunt day. +120k/sec" }
];

let upgrades = JSON.parse(JSON.stringify(initialUpgrades));

// --- LOGIC ---

document.getElementById('lincoln-main').addEventListener('click', (e) => {
    let val = clickPower * (1 + (goldenTortas * 0.1));
    energy += val;
    showParticle(e.clientX, e.clientY, `🥚`);
    updateUI();
});

setInterval(() => { 
    let boostedCPS = cps * (1 + (goldenTortas * 0.1));
    energy += (boostedCPS / 10); 
    updateUI(); 
}, 100);

function updateUI() {
    document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
    document.getElementById('stat-click').innerText = (clickPower * (1 + (goldenTortas * 0.1))).toFixed(1);
    document.getElementById('stat-cps').innerText = (cps * (1 + (goldenTortas * 0.1))).toFixed(1);
    document.getElementById('stat-prestige').innerText = goldenTortas;
    document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';
    
    upgrades.forEach(u => {
        const btn = document.getElementById(`up-${u.id}`);
        if (btn) {
            btn.disabled = energy < u.cost;
            energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
            document.getElementById(`cost-${u.id}`).innerText = u.cost.toLocaleString() + " Eggs";
            document.getElementById(`count-${u.id}`).innerText = u.count || 0;
        }
    });

    const body = document.body; const label = document.getElementById('env-label');
    if (energy < 100000) { body.className = 'bg-kitchen'; label.innerText = "LOCATION: THE GARDEN GATE"; }
    else if (energy < 10000000) { body.className = 'bg-buffet'; label.innerText = "LOCATION: BLOOMING FLOWERBEDS"; }
    else if (energy < 1000000000) { body.className = 'bg-factory'; label.innerText = "LOCATION: CANDY WORKSHOP"; }
    else { body.className = 'bg-space'; label.innerText = "LOCATION: THE GREAT EGG NEBULA"; }
}

function initShop() {
    const shop = document.getElementById('shop'); shop.innerHTML = '';
    upgrades.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'upgrade'; btn.id = `up-${u.id}`;
        btn.onclick = () => buyUpgrade(u.id);
        btn.innerHTML = `<div class="u-info"><span class="u-name">${u.name}</span><span class="u-desc">${u.desc}</span><span class="u-cost" id="cost-${u.id}">${u.cost.toLocaleString()} Eggs</span></div><div class="u-count" id="count-${u.id}">${u.count || 0}</div>`;
        shop.appendChild(btn);
    });
}

function buyUpgrade(id) {
    const u = upgrades[id];
    if (energy >= u.cost) {
        energy -= u.cost;
        u.count = (u.count || 0) + 1;
        if (u.type === "click") clickPower += u.power; else cps += u.power;
        u.cost = Math.ceil(u.cost * 1.35);
        updateUI();
        saveGame();
    }
}

function prestige() {
    if (energy < 1000000000) return;
    const bonus = Math.floor(Math.log10(energy / 1000000000)) + 1;
    if (confirm(`Find ${bonus} Golden Carrots? (Your basket resets, but you get a permanent boost!)`)) {
        goldenTortas += bonus;
        energy = 0; clickPower = 1; cps = 0;
        upgrades = JSON.parse(JSON.stringify(initialUpgrades));
        initShop(); saveGame(); updateUI();
    }
}

function showParticle(x, y, text) {
    const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    document.body.appendChild(p); setTimeout(() => p.remove(), 800);
}

// --- PERSISTENT SAVING ---
function saveGame() {
    const gameData = {
        energy,
        clickPower,
        cps,
        goldenTortas,
        upgrades
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(gameData));
    
    const now = new Date();
    const timeString = now.toLocaleTimeString('en-US', { 
        timeZone: 'America/New_York', 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true 
    }).replace(/^0/, '');

    document.getElementById('save-status').innerText = `Saved at ${timeString} (EST)`;
}

function loadGame() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
        const d = JSON.parse(saved);
        energy = d.energy || 0;
        clickPower = d.clickPower || 1;
        cps = d.cps || 0;
        goldenTortas = d.goldenTortas || 0;
        
        // This part is clever: it merges saved upgrades with the current list
        // so if you add NEW upgrades in the future, they appear even for old players!
        if (d.upgrades) {
            d.upgrades.forEach(savedU => {
                const currentU = upgrades.find(u => u.id === savedU.id);
                if (currentU) {
                    currentU.count = savedU.count;
                    currentU.cost = savedU.cost;
                }
            });
        }
    }
    initShop(); 
    updateUI();
}

function resetGame() { 
    if (confirm("Clear your basket and start over? This wipes all progress!")) { 
        localStorage.removeItem(SAVE_KEY); 
        location.reload(); 
    } 
}

// Start game
loadGame();
setInterval(saveGame, 10000); // Auto-save every 10 seconds
</script>
</body>
</html>
