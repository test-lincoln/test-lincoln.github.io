<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Lincoln's Ultimate...</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffafcc; /* Soft Pink */
            font-family: 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        h1 {
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 175, 204, 0.5);
        }

        /* The outer bar */
        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #e0b0ff; /* Lavender */
            height: 25px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(224, 176, 255, 0.2);
        }

        /* The moving fill */
        .progress-fill {
            background: linear-gradient(90deg, #7bf1a8, #fff3b0); /* Grass to Sunshine */
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #7bf1a8; /* Grass Green */
            font-weight: bold;
        }

        /* Just a little floating animation for the title */
        .float {
            animation: floating 2s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="loader-container">
    <h1 class="float">LOADING...</h1>
    <div class="progress-bg">
        <div class="progress-fill" id="fill"></div>
    </div>
    <p class="status-text" id="status">Waking up Lincoln...</p>
</div>

<script>
    const messages = [
        "Waking up Lincoln...",
        "Polishing Golden Tortas...",
        "Hiding Easter Eggs...",
        "Charging up Click Power...",
        "Preparing the Candy Workshop..."
    ];

    let progress = 0;
    const fillElement = document.getElementById('fill');
    const statusElement = document.getElementById('status');
    
    // Adjust totalTime to make it faster or slower (in milliseconds)
    const totalTime = 3000; 
    const intervalTime = 30; 
    const step = 100 / (totalTime / intervalTime);

    const loadingInterval = setInterval(() => {
        progress += step;
        fillElement.style.width = Math.min(progress, 100) + "%";

        // Change messages randomly as it loads
        if (Math.random() > 0.95) {
            statusElement.innerText = messages[Math.floor(Math.random() * messages.length)];
        }

        if (progress >= 100) {
            clearInterval(loadingInterval);
            statusElement.innerText = "READY!";
            statusElement.style.color = "#fff3b0";
            
            // Short delay at 100% for satisfaction, then redirect
            setTimeout(() => {
                window.location.href = "game.html";
            }, 300);
        }
    }, intervalTime);
</script>

</body>
</html>
