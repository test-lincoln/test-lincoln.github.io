<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker</title>
    <link rel="icon" type="image/jpeg" href="IMG_0668.jpg">
    <style>
        .raindrop { position: fixed; top: -10px; width: 2px; height: 15px; background: #00d2ff; opacity: 0.6; pointer-events: none; z-index: 9998; animation: rain-fall linear forwards; }
        @keyframes rain-fall { to { transform: translateY(110vh); } }
        
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --bg: #1e272e; --gold: #f1c40f; --success: #55efc4; }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #1e272e;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        .bg-kitchen { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200'); }
        .bg-buffet { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200'); }
        .bg-factory { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1200'); }
        .bg-space { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200'); }

        #game-wrapper { max-width: 1200px; width: 100%; display: flex; gap: 20px; padding: 20px; box-sizing: border-box; z-index: 1; }
        .left-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .clicker-section { text-align: center; display: flex; flex-direction: column; align-items: center; }

        #score-panel {
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 20px;
            border: 3px solid var(--primary); width: 100%; backdrop-filter: blur(15px);
        }

        #score-text { font-size: 3.5rem; color: var(--gold); margin: 0; line-height: 1.2; }

        #lincoln-main {
            width: 280px; height: 280px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.05s, filter 0.3s; user-select: none; margin-top: 10px;
        }
        #lincoln-main:active { transform: scale(0.94); }

        .shop-container {
            flex: 1.2; background: rgba(0, 0, 0, 0.5); padding: 15px;
            border-radius: 20px; height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .upgrade {
            width: 100%; background: #2f3542; border: 2px solid #444;
            border-radius: 12px; padding: 12px 18px; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .can-afford { border-color: var(--gold) !important; background: #3e4452; }
        .u-info { text-align: left; }
        .u-name { font-weight: bold; color: #fab1a0; display: block; }
        .u-cost { color: var(--success); font-size: 0.9rem; }
        .u-count { font-size: 1.5rem; font-weight: bold; opacity: 0.6; }

        .prestige-btn { background: var(--gold); color: black; font-weight: bold; width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; animation: pulse-gold 2s infinite; }
        
        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(241, 196, 15, 0); } 100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); } }
    </style>
</head>
<body class="bg-kitchen">

<div id="game-wrapper">
    <div class="left-column">
        <div class="clicker-section">
            <div id="score-panel">
                <h1 id="score-text">0</h1>
                <p id="env-label" style="margin: 5px 0; letter-spacing: 2px; font-size: 0.7rem; color: #aaa;">LOCATION: THE KITCHEN</p>
                <div style="font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-top: 10px;">
                    Per Click: <span id="stat-click">1</span> | Sec: <span id="stat-cps">0</span><br>
                    Golden Tortas: <span id="stat-prestige" style="color:var(--gold)">0</span>
                </div>
            </div>
            <img src="IMG_0688.jpg" id="lincoln-main" alt="Lincoln">
            <button class="prestige-btn" id="prestige-btn" style="display:none;" onclick="prestige()">WEIGH IN</button>
            <div style="margin-top:20px;">
                <button onclick="resetGame()" style="background:none; border:none; color:#555; cursor:pointer; font-size: 0.7rem; text-decoration: underline;">Hard Reset Game</button>
            </div>
        </div>
    </div>
    <div class="shop-container" id="shop"></div>
</div>

<script>
let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0;

const initialUpgrades = [
    { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click", desc: "+0.1 Click Power" },
    { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps", desc: "+0.3 Mass/sec" },
    { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps", desc: "+0.8 Mass/sec" },
    { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click", desc: "+0.6 Click Power" },
    { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps", desc: "+2.5 Mass/sec" },
    { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps", desc: "+7.0 Mass/sec" },
    { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps", desc: "+15.0 Mass/sec" },
    { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps", desc: "+50.0 Mass/sec" },
    { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click", desc: "+12 Click Power" },
    { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps", desc: "+150 Mass/sec" },
    { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps", desc: "+500 Mass/sec" },
    { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps", desc: "+1500 Mass/sec" },
    { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click", desc: "+1200 Click Power" },
    { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps", desc: "+18k Mass/sec" },
    { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps", desc: "+120k Mass/sec" }
];

let upgrades = JSON.parse(JSON.stringify(initialUpgrades));

document.getElementById('lincoln-main').addEventListener('click', (e) => {
    let val = clickPower * (1 + (goldenTortas * 0.1));
    energy += val;
    showParticle(e.clientX, e.clientY, `+${val.toFixed(1)}`);
    updateUI();
});

setInterval(() => { 
    let boostedCPS = cps * (1 + (goldenTortas * 0.1));
    energy += (boostedCPS / 10); 
    updateUI(); 
}, 100);

function updateUI() {
    document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
    document.getElementById('stat-click').innerText = (clickPower * (1 + (goldenTortas * 0.1))).toFixed(1);
    document.getElementById('stat-cps').innerText = (cps * (1 + (goldenTortas * 0.1))).toFixed(1);
    document.getElementById('stat-prestige').innerText = goldenTortas;
    document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';
    
    upgrades.forEach(u => {
        const btn = document.getElementById(`up-${u.id}`);
        if (btn) {
            btn.disabled = energy < u.cost;
            energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
            document.getElementById(`cost-${u.id}`).innerText = u.cost.toLocaleString() + " Mass";
            document.getElementById(`count-${u.id}`).innerText = u.count || 0;
        }
    });

    const body = document.body; const label = document.getElementById('env-label');
    if (energy < 100000) { body.className = 'bg-kitchen'; label.innerText = "LOCATION: THE KITCHEN"; }
    else if (energy < 10000000) { body.className = 'bg-buffet'; label.innerText = "LOCATION: INFINITE BUFFET"; }
    else if (energy < 1000000000) { body.className = 'bg-factory'; label.innerText = "LOCATION: TORTA FACTORY"; }
    else { body.className = 'bg-space'; label.innerText = "LOCATION: OUTER SPACE"; }
}

function initShop() {
    const shop = document.getElementById('shop'); shop.innerHTML = '';
    upgrades.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'upgrade'; btn.id = `up-${u.id}`;
        btn.onclick = () => buyUpgrade(u.id);
        btn.innerHTML = `<div class="u-info"><span class="u-name">${u.name}</span><span class="u-desc">${u.desc}</span><span class="u-cost" id="cost-${u.id}">${u.cost.toLocaleString()} Mass</span></div><div class="u-count" id="count-${u.id}">${u.count || 0}</div>`;
        shop.appendChild(btn);
    });
}

function buyUpgrade(id) {
    const u = upgrades[id];
    if (energy >= u.cost) {
        energy -= u.cost;
        u.count = (u.count || 0) + 1;
        if (u.type === "click") clickPower += u.power; else cps += u.power;
        u.cost = Math.ceil(u.cost * 1.35);
        updateUI();
        saveGame();
    }
}

function prestige() {
    if (energy < 1000000000) return;
    const bonus = Math.floor(Math.log10(energy / 1000000000)) + 1;
    if (confirm(`Weigh in for ${bonus} Golden Tortas? (This resets Mass and Upgrades but gives a permanent boost!)`)) {
        goldenTortas += bonus;
        energy = 0; clickPower = 1; cps = 0;
        upgrades = JSON.parse(JSON.stringify(initialUpgrades));
        initShop(); saveGame(); updateUI();
    }
}

function showParticle(x, y, text) {
    const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    document.body.appendChild(p); setTimeout(() => p.remove(), 800);
}

function saveGame() {
    localStorage.setItem('lincoln_save_local', JSON.stringify({
        energy, clickPower, cps, goldenTortas, upgrades
    }));
}

function loadGame() {
    const saved = localStorage.getItem('lincoln_save_local');
    if (saved) {
        const d = JSON.parse(saved);
        energy = d.energy || 0;
        clickPower = d.clickPower || 1;
        cps = d.cps || 0;
        goldenTortas = d.goldenTortas || 0;
        if (d.upgrades) upgrades = d.upgrades;
    }
    initShop(); updateUI();
}

function resetGame() { if (confirm("Completely reset your progress?")) { localStorage.clear(); location.reload(); } }

// Start game immediately
loadGame();
setInterval(saveGame, 5000); // Auto-save every 5 seconds
</script>
</body>
</html>
